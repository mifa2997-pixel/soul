<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감정신호등, 오늘의 말</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Gaegu', cursive; 
        }
        .pastel-shadow { 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        .emoji-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="emoji-container" class="emoji-bg"></div>

    <div class="max-w-md w-full bg-white rounded-3xl p-8 pastel-shadow text-center relative z-10 border-4 border-indigo-100">
        <h1 class="text-4xl font-bold text-indigo-400 mb-2">🚦 감정신호등</h1>
        <p class="text-xl text-gray-500 mb-6">아침에 등교해서 지금 내 기분을 눌러보세요.</p>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="showMessage('happy')" class="bg-yellow-50 hover:bg-yellow-100 transition p-4 rounded-2xl border-2 border-yellow-200 text-center">
                <div class="text-4xl mb-2">😊</div>
                <div class="text-xl font-bold text-yellow-700">기뻐요</div>
            </button>
            <button onclick="showMessage('sad')" class="bg-blue-50 hover:bg-blue-100 transition p-4 rounded-2xl border-2 border-blue-200 text-center">
                <div class="text-4xl mb-2">😢</div>
                <div class="text-xl font-bold text-blue-700">슬퍼요</div>
            </button>
            <button onclick="showMessage('angry')" class="bg-red-50 hover:bg-red-100 transition p-4 rounded-2xl border-2 border-red-200 text-center">
                <div class="text-4xl mb-2">😡</div>
                <div class="text-xl font-bold text-red-700">화나요</div>
            </button>
            <button onclick="showMessage('anxious')" class="bg-purple-50 hover:bg-purple-100 transition p-4 rounded-2xl border-2 border-purple-200 text-center">
                <div class="text-4xl mb-2">😰</div>
                <div class="text-xl font-bold text-purple-700">떨려요</div>
            </button>
            <button onclick="showMessage('sleepy')" class="bg-green-50 hover:bg-green-100 transition p-4 rounded-2xl border-2 border-green-200 text-center col-span-2">
                <div class="text-4xl mb-2">😴</div>
                <div class="text-xl font-bold text-green-700">피곤해요</div>
            </button>
        </div>

        <div id="message-container" class="hidden min-h-[120px] bg-indigo-50 rounded-2xl p-6 flex items-center justify-center animate-pulse">
            <p id="message-text" class="text-2xl text-indigo-800 font-medium leading-relaxed"></p>
        </div>
    </div>

    <footer class="mt-8 text-indigo-300 text-sm z-10">
        made by lim teacher ❤️
    </footer>

    <script>
        const messages = {
            happy: [
                "우와, 오늘 정말 기분 좋은 날이구나! 너의 밝은 에너지가 우리 반에 가득해!",
                "와! 오늘 표정이 정말 햇살처럼 밝네. 그 예쁜 미소 계속 보여줘!",
                "기분 좋은 일이 있었나 봐? 선생님도 덩달아 기분이 좋아져!"
            ],
            sad: [
                "마음이 조금 힘들구나. 괜찮아, 누구나 그럴 때가 있어. 선생님이 안아줄게.",
                "슬픈 마음은 곧 구름처럼 지나갈 거야. 오늘 하루도 선생님이 응원할게!",
                "많이 속상했지? 괜찮아. 우리 천천히 마음을 추스러보자."
            ],
            angry: [
                "화가 나는 일이 있었구나. 심호흡을 크게 한번 해볼까? 후~ 하고!",
                "속상한 마음이 크구나. 조금만 지나면 마음이 편안해질 거야. 선생님이 곁에 있을게.",
                "화가 나도 괜찮아. 조금 천천히 생각해보자. 선생님이랑 같이 해결해보자!"
            ],
            anxious: [
                "새로운 일이라 조금 떨리는구나. 걱정하지 마, 너는 충분히 잘해낼 수 있어!",
                "조금 긴장되니? 괜찮아, 네가 잘할 거라는 걸 선생님은 믿어!",
                "두근두근 떨리지만, 분명 멋지게 해낼 거야. 선생님이 항상 응원해!"
            ],
            sleepy: [
                "잠이 많이 오나 봐. 학교 오느라 고생했어! 오늘은 조금 더 힘내보자!",
                "눈꺼풀이 무겁구나? 조금만 스트레칭 해볼까? 파이팅!",
                "오늘 하루도 조금만 힘내자! 학교 마치고 집에 가서 푹 쉬면 돼."
            ]
        };

        function createBackgroundEmojis() {
            const container = document.getElementById('emoji-container');
            const emojis = ['✨', '💕', '🎈', '⭐', '🌈', '🍭', '🎨'];
            for (let i = 0; i < 15; i++) {
                const div = document.createElement('div');
                div.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                div.style.position = 'absolute';
                div.style.left = Math.random() * 100 + '%';
                div.style.top = Math.random() * 100 + '%';
                div.style.fontSize = (Math.random() * 20 + 20) + 'px';
                div.className = 'animate-float';
                div.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(div);
            }
        }

        function showMessage(emotion) {
            const container = document.getElementById('message-container');
            const textElement = document.getElementById('message-text');
            
            // Random message selection
            const list = messages[emotion];
            const randomMsg = list[Math.floor(Math.random() * list.length)];
            
            container.classList.remove('hidden');
            textElement.innerText = randomMsg;
            
            // Re-trigger animation
            container.classList.remove('animate-pulse');
            void container.offsetWidth; 
            container.classList.add('animate-pulse');
        }

        window.onload = createBackgroundEmojis;
    </script>
</body>
</html>
